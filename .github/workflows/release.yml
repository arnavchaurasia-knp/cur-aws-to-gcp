name: Release

# Cuts a Linux build whenever a tag of the form v* is pushed.
# Manual dispatch is also allowed for ad-hoc builds without a tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed to attach release assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o cur-web ./cmd/server
          tar czf cur-web-linux-amd64.tar.gz cur-web
          sha256sum cur-web-linux-amd64.tar.gz > cur-web-linux-amd64.tar.gz.sha256

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Pack frontend dist
        run: |
          tar czf frontend-dist.tar.gz -C frontend dist
          sha256sum frontend-dist.tar.gz > frontend-dist.tar.gz.sha256

      - name: Pack skill
        run: |
          tar czf skill.tar.gz -C skill aws-gcp-cost-projection
          sha256sum skill.tar.gz > skill.tar.gz.sha256

      - name: Upload as workflow artifacts (manual dispatch debug)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cur-web-build-${{ github.sha }}
          path: |
            cur-web-linux-amd64.tar.gz
            cur-web-linux-amd64.tar.gz.sha256
            frontend-dist.tar.gz
            frontend-dist.tar.gz.sha256
            skill.tar.gz
            skill.tar.gz.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cur-web-linux-amd64.tar.gz
            cur-web-linux-amd64.tar.gz.sha256
            frontend-dist.tar.gz
            frontend-dist.tar.gz.sha256
            skill.tar.gz
            skill.tar.gz.sha256
          generate_release_notes: true
