server {
    listen 80;
    server_name cur.facets.cloud;

    root /var/www/cur-web;
    index index.html;

    # API → Go binary
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
